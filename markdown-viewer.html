<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Viewer | English Dictation Studio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .md-viewer {
            max-width: 900px;
        }

        .md-viewer .md-body {
            padding: 28px;
            border-radius: 20px;
            background: var(--surface-strong);
            border: 1px solid var(--line);
            line-height: 1.8;
            overflow-x: auto;
        }

        .md-body h1 {
            font-size: 26px;
            border-bottom: 2px solid var(--line);
            padding-bottom: 10px;
            margin-bottom: 22px;
        }

        .md-body h2 {
            font-size: 22px;
            margin-top: 32px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--line);
        }

        .md-body h3 {
            font-size: 18px;
            margin-top: 24px;
            color: var(--accent-dark);
        }

        .md-body p {
            margin-bottom: 12px;
            color: var(--ink-main);
        }

        .md-body code {
            padding: 2px 6px;
            border-radius: 6px;
            background: rgba(23, 50, 77, 0.07);
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 0.92em;
            color: var(--ink-strong);
        }

        .md-body pre {
            padding: 16px;
            border-radius: 14px;
            background: rgba(23, 50, 77, 0.05);
            overflow-x: auto;
        }

        .md-body pre code {
            background: none;
            padding: 0;
        }

        .md-body ol,
        .md-body ul {
            padding-left: 24px;
            margin-bottom: 14px;
        }

        .md-body li {
            margin-bottom: 6px;
        }

        .md-body strong {
            color: var(--ink-strong);
        }

        .md-body hr {
            border: none;
            border-top: 1px solid var(--line);
            margin: 24px 0;
        }

        .md-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
        }

        .md-nav a {
            text-decoration: none;
        }

        .md-loading {
            padding: 40px;
            text-align: center;
            color: var(--ink-soft);
        }
    </style>
</head>
<body>
    <div class="container md-viewer">
        <h1>Markdown Viewer</h1>
        <p class="lead-text" id="md-title">ドキュメントを読み込んでいます...</p>

        <div class="md-nav">
            <a href="index.html" class="secondary-btn resource-link">ディクテーションに戻る</a>
            <a href="grammar-quiz.html" class="secondary-btn resource-link">文法の1問チェック</a>
        </div>

        <div id="md-body" class="md-body">
            <p class="md-loading">読み込み中...</p>
        </div>
    </div>

    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var file = params.get("file");

            var ALLOWED_FILES = [
                "docs/grammar-review-quiz.md",
                "docs/grammar-review.md",
                "docs/grammar-review-plan.md",
                "docs/advanced-linguistics.md",
                "docs/advanced-linguistics-plan.md"
            ];

            if (!file || ALLOWED_FILES.indexOf(file) === -1) {
                document.getElementById("md-title").textContent = "表示可能なファイルが指定されていません。";
                document.getElementById("md-body").innerHTML =
                    "<p>URLパラメータ <code>?file=docs/grammar-review-quiz.md</code> の形式でファイルを指定してください。</p>" +
                    "<ul>" + ALLOWED_FILES.map(function (f) {
                        return '<li><a href="?file=' + f + '">' + f + "</a></li>";
                    }).join("") + "</ul>";
                return;
            }

            document.getElementById("md-title").textContent = file;

            fetch(file)
                .then(function (res) {
                    if (!res.ok) throw new Error("HTTP " + res.status);
                    return res.text();
                })
                .then(function (md) {
                    document.getElementById("md-body").innerHTML = renderMarkdown(md);
                })
                .catch(function (err) {
                    document.getElementById("md-body").innerHTML =
                        "<p>読み込みに失敗しました。ローカルサーバー経由で開いてください。</p>" +
                        "<p><code>" + err.message + "</code></p>";
                });

            function renderMarkdown(text) {
                var html = text
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");

                html = html.replace(/^### (.+)$/gm, "<h3>$1</h3>");
                html = html.replace(/^## (.+)$/gm, "<h2>$1</h2>");
                html = html.replace(/^# (.+)$/gm, "<h1>$1</h1>");

                html = html.replace(/`([^`\n]+)`/g, "<code>$1</code>");
                html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");

                html = html.replace(/^(\d+)\.\s+(.+)$/gm, '<li class="ol-item">$2</li>');
                html = html.replace(/^- (.+)$/gm, "<li>$1</li>");

                html = html.replace(/((?:<li class="ol-item">[^]*?<\/li>\s*)+)/g, function (block) {
                    return "<ol>" + block.replace(/ class="ol-item"/g, "") + "</ol>";
                });
                html = html.replace(/((?:<li>(?:(?!class=)[^])*?<\/li>\s*)+)/g, function (block) {
                    if (block.indexOf("<ol>") !== -1) return block;
                    return "<ul>" + block + "</ul>";
                });

                html = html.replace(/^---$/gm, "<hr>");

                var lines = html.split("\n");
                var result = [];
                var inParagraph = false;

                for (var i = 0; i < lines.length; i++) {
                    var line = lines[i].trim();

                    if (!line) {
                        if (inParagraph) {
                            result.push("</p>");
                            inParagraph = false;
                        }
                        continue;
                    }

                    if (/^<(h[1-3]|ol|ul|li|hr|pre|blockquote)/.test(line)) {
                        if (inParagraph) {
                            result.push("</p>");
                            inParagraph = false;
                        }
                        result.push(line);
                        continue;
                    }

                    if (!inParagraph) {
                        result.push("<p>" + line);
                        inParagraph = true;
                    } else {
                        result.push("<br>" + line);
                    }
                }

                if (inParagraph) {
                    result.push("</p>");
                }

                return result.join("\n");
            }
        })();
    </script>
</body>
</html>
